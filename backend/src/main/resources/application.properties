server.port=8080
spring.application.name=medicare-ai-backend

# ==============================
# H2 In-Memory DB (Development)
# ==============================
spring.datasource.url=jdbc:h2:mem:medicaredb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================
# MySQL (Production) — uncomment
# ==============================
# spring.datasource.url=jdbc:mysql://localhost:3306/medicare_db?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ==============================
# Google Gemini API
# ==============================
gemini.api.key=YOUR_GEMINI_API_KEY_HERE
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# ==============================
# CORS
# ==============================
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ==============================
# Logging
# ==============================
logging.level.com.medicare=INFO
logging.level.org.springframework.web=WARN
